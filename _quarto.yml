# _quarto.yml ----
# Using the `website` project type rather than `manuscript` ‚Äî manuscript
# projects force a Jupyter engine/kernel even for pure-R content, which we
# don't want here.

project:
  type: website
  output-dir: output
  # Execute every .qmd's code with working directory = project root, not
  # the file's own folder (Quarto's default). Without this, tar_read()/
  # tar_load() calls in supplementary/*.qmd can't find ../_targets since
  # `targets` resolves the store relative to the R session's working
  # directory, not via here() ‚Äî confirmed by direct testing, see CLAUDE.md.
  execute-dir: project

website:
  title: "Manuscript Title"
  sidebar:
    style: "docked"
    search: true
    contents:
        - section: "Article"
          contents:
            - href: index.qmd
              text: "Main File"
        - section: "Notebooks" # Notebooks with programmatic logic
          contents:
            - href: supplementary\notebook-template.qmd
              text: "Notebook Template"
              icon: journal-code
            - href: supplementary\images-mre.qmd
              text: "Rendering Images in Quarto"
              icon: journal-code
            - href: supplementary\tables-mre.qmd
              text: "Rendering Tables in Quarto"
              icon: journal-code
        - section: "Appendices" # Static files

format: 
  html:
    css: styles.css
    theme: cosmo
    toc: true
  docx:
    # reference-doc: styles/standard.docx         # bog standard word formatting
    reference-doc: styles/db-space-line-n.docx    # for revisions
    toc: true # probably don't want this for the final version of anything
  typst: default

bibliography: references.bib
csl: styles/apa.csl # other styles at https://github.com/citation-style-language/styles

fig-width: 6
fig-height: 4
fig-dpi: 300

execute:
  freeze: true # I think (but aren't sure) this conflicts with targets
  echo: false # we might concievably want to echo source code in HTML, but for Word/PDF this is a sensible default

