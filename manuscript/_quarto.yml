# manuscript/_quarto.yml ----
# Using the `website` project type rather than `manuscript` - manuscript
# projects force a Jupyter engine/kernel even for pure-R content, which we
# don't want here.
#
# Self-contained Quarto project rooted at manuscript/, one level below the
# repo root - its own _freeze/, .quarto/, and (via output-dir below) its
# own output/ folder, isolated from anything else in the repo. Pattern
# borrowed from https://github.com/kazuyanagimoto/quarto-research-blog.
# See "Directory layout" in CLAUDE.md/README.md for the full picture.

project:
  type: website
  # output-dir must stay INSIDE this project's own directory (manuscript/)
  # - confirmed by direct testing that pointing it outside via output-dir:
  # ../output is a genuinely broken configuration, not just unusual: Quarto
  # warns "did not expect the path configuration being used in this
  # project, and strange behavior may result" and "Refusing to remove
  # directory ... since it is not a subdirectory of the main project
  # directory", and in practice scattered rendered output across THREE
  # places at once (a stray index_files/ at the repo root, a full render
  # dropped directly in manuscript/, and the intended output/) instead of
  # writing cleanly to one. Likely root cause of a recurring typst "file
  # not found" bug for intermediate _files/ images, and possibly the
  # docx-corruption regression too - both classic symptoms of Quarto's
  # intermediate-file bookkeeping getting confused about where things
  # belong. Output now lands in manuscript/output/, not output/ at the
  # repo root - see CLAUDE.md/README.md's "Directory layout".
  output-dir: output
  # Meant to execute every .qmd's code with cwd = this project's own root
  # (manuscript/), not the file's own folder (Quarto's default) -
  # confirmed by direct testing this only actually holds for a plain
  # `quarto render`; this project's real render path
  # (tarchetypes::tar_quarto(), the render_manuscript target in
  # _targets.R) has cwd = the REPO ROOT instead, not manuscript/ - see
  # CLAUDE.md's "Consequence of nesting manuscript/..." section. Don't
  # trust cwd for any file path in manuscript/**/*.qmd regardless of this
  # setting; use here::here(...) (anchored via here::i_am()) instead. E.g.
  # tar_read()/tar_load() calls in manuscript.qmd/supplementary/*.qmd/
  # tables/figures partials can't find _targets/ via a plain tar_read(x) -
  # that store lives at the repo root, not inside manuscript/ either way.
  # Pass store = here::here("_targets") explicitly to every
  # tar_read()/tar_load() call instead of relying on cwd - confirmed by
  # direct testing this is genuinely required, not just defensive.
  execute-dir: project

lang: en-GB

website:
  sidebar:
    style: "docked"
    search: true
    contents:
        - section: "Article"
          contents:
            - href: manuscript.qmd
              text: "Main File"
        - section: "Notebooks" # Notebooks with programmatic logic
          contents:
            - href: supplementary\notebook-template.qmd
              text: "Notebook Template"
              icon: journal-code
            - href: supplementary\rendering-pipeline.qmd
              text: "How Rendering Works: knitr, Pandoc, Typst"
              icon: journal-code
            - href: supplementary\images-mre.qmd
              text: "Rendering Images in Quarto"
              icon: journal-code
            - href: supplementary\tables-mre.qmd
              text: "Rendering Tables in Quarto"
              icon: journal-code
            - href: supplementary\ci-pipeline.qmd
              text: "Continuous Integration"
              icon: journal-code
            - href: supplementary\testing-mre.qmd
              text: "Testing R/functions.R"
              icon: journal-code
        - section: "Appendices" # Static files

format: 
  html:
    css: styles/styles.css
    theme: cosmo
    toc: true
    code-fold: true
    code-overflow: wrap
    mainfont: "Fira Sans"
    monofont: "Fira Code"
    number-sections: true
    lightbox: true  # enable click-to-zoom images
    # default HTML dimensions are a bit narrow (note that styles.css will override these)
    grid:
      sidebar-width: 250px
      body-width: 900px
      margin-width: 300px
    citeproc: true # needed?


  docx:
    reference-doc: styles/standard.docx         # bog standard word formatting
    # reference-doc: styles/db-space-line-n.docx    # for revisions
    toc: false # true adds a link warning on opening
    tbl-cap-location: bottom # fixes a bug with docx corruption (see readme)
  typst:
    number-sections: true

# Must resolve INSIDE manuscript/ - confirmed by direct testing that
# `../references.bib` (reaching outside this project's own root) hard-
# errors typst specifically: `error: failed to load file (access denied)
# ... cannot read file outside of project root`. Same underlying
# constraint as output-dir above, just hit via a different config key -
# typst's own sandbox refuses to read anything outside the Quarto project
# root, regardless of which setting tries to point there. Quarto Wingman /
# Zotero for Quarto defaults to writing bibliography exports at the repo
# root, not here - see .vscode/settings.json's zoteroForQuarto.bibFile and
# CLAUDE.md's "Citations" note for why that's set at the workspace level.
bibliography: references.bib
csl: styles/apa.csl # other styles at https://github.com/citation-style-language/styles

fig-width: 6
fig-height: 4
fig-dpi: 300

execute:
  freeze: false # I think (but aren't sure) this conflicts with targets
  echo: false # we might concievably want to echo source code in HTML, but for Word/PDF this is a sensible default


authors:
  - name: Sam Welch
    affiliation: Norwegian Institute for Water Research
    roles: [conceptualization, data curation, formal analysis, investigation, methodology, software, validation, visualization]
    corresponding: true
    email: sam.welch@niva.no
    orcid: 0000-0003-4743-4562

comments:
  hypothesis: true # enables comments using a 3rd party service

# filters execute (Lua) code on the rendered qmd before creating other formats (stupid name, imho)
filters: [flextable-qmd]