name: Render manuscript

# Rebuilds the whole targets pipeline and renders manuscript/ on every push
# and PR - catches the class of bug this template has hit by hand (docx
# corruption, one bad image format silently stalling html/docx too, a
# render that works locally but not from a clean checkout) automatically,
# instead of only when someone remembers to render all three formats. See
# manuscript/supplementary/ci-pipeline.qmd for the full writeup.
#
# On push to main only, also deploys manuscript/output/ to GitHub Pages
# (Settings → Pages → Source: GitHub Actions, already enabled) via the
# artifact-based deploy, not a gh-pages branch - chosen for no git-history
# bloat from rendered output; cheap to swap for quarto-actions/publish
# later if that tradeoff ever stops making sense, since the two approaches
# don't share any state. PRs render and test but never deploy.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # manual redeploy button, no empty commit needed

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    # Local renders finish in ~4 minutes; GitHub's default job timeout is
    # 6 hours, which is how a hung headless-Chrome mermaid render burned
    # ~3 hours before someone noticed and cancelled it manually. Fail fast
    # instead - see manuscript/supplementary/ci-pipeline.qmd.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # No DESCRIPTION file (this isn't an R package), so packages are
      # listed explicitly - keep this list in sync with runme.R's
      # required_pkgs. setup-r-dependencies also installs the Ubuntu
      # system libraries these packages need (libcurl, libmagick++, Cairo,
      # ...) via pak's sysreqs database, which plain install.packages()
      # does not.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            targets
            tarchetypes
            quarto
            tibble
            here
            jsonlite
            kableExtra
            gt
            flextable
            huxtable
            DT
            ggplot2
            magick
            svglite
            testthat
            withr

      - uses: quarto-dev/quarto-actions/setup@v2

      # Hypothesis fix, not yet confirmed in actual CI: a real run hung
      # for ~3h at render_manuscript and was cancelled manually, with
      # orphaned chrome/chrome_crashpad_handler/deno processes left behind
      # at cleanup. Quarto renders this repo's mermaid diagrams
      # (images-mre.qmd, rendering-pipeline.qmd) to PNG for docx/typst via
      # a Deno-managed "chrome-headless-shell" (confirmed as a real,
      # separate ~115MB download via `quarto install chrome-headless-shell`,
      # tested directly in this session - "chromium" is the older, legacy
      # target name), downloaded/launched lazily on first use - that
      # almost certainly hung mid-render rather than failing cleanly.
      # Pre-installing it here, as its own visible step with output and
      # (via timeout-minutes above) a hard time limit, should surface a
      # download/launch problem quickly instead of silently stalling
      # render_manuscript for hours. See
      # manuscript/supplementary/ci-pipeline.qmd for the full writeup - the
      # download itself was confirmed to work in this session, but NOT
      # whether this actually fixes the CI hang; the next CI run is what
      # tests that part.
      - name: Install Quarto's headless Chrome (mermaid → docx/typst)
        run: quarto install chrome-headless-shell --no-prompt

      # Closes the one documented-but-unverified-locally gap: without
      # rsvg-convert, docx SVG embedding has no raster fallback (see
      # images-mre.qmd). Installing it here means CI's docx render is
      # actually clean, not just "didn't error."
      - name: Install rsvg-convert (docx SVG embedding)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Run tests
        run: Rscript -e 'testthat::test_dir("tests/testthat", stop_on_failure = TRUE)'

      - name: Import example raw data
        run: Rscript -e 'source("data-raw/import-data.R")'

      - name: Build pipeline and render manuscript
        run: Rscript -e 'targets::tar_make()'

      # Uploaded even on failure (if: always()) - a stale/partial
      # output/ is itself useful for debugging the exact "one format
      # failed, others look fine" gotcha documented in CLAUDE.md.
      - name: Upload rendered manuscript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-output
          path: manuscript/output/
          if-no-files-found: ignore

      # Separate from the debug artifact above - upload-pages-artifact
      # packages output specifically for actions/deploy-pages in the
      # deploy job below. Only on a real render (no if: always()) and only
      # for main/dispatch, never PRs - a broken render shouldn't publish,
      # and a PR shouldn't touch the live site at all.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: manuscript/output/

  deploy:
    needs: render
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
